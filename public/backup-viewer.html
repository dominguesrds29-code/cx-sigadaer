<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Backups - Organograma</title>
    <link rel="icon" type="image/png" href="favicon_final_organogram_1778008047801.png">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #f59e0b; /* Amber para Backups */
            --text-color: #f8fafc;
            --border-color: #334155;
            --node-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-color); color: var(--text-color); overflow: hidden; }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--accent-color); }
        
        .backup-list-container { flex: 1; overflow-y: auto; padding: 12px; }
        .backup-item {
            padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer;
            border: 1px solid transparent; transition: all 0.2s; background: rgba(255,255,255,0.03);
        }
        .backup-item:hover { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }
        .backup-item.active { background: rgba(245, 158, 11, 0.2); border-color: var(--accent-color); }
        .backup-name { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #e2e8f0; }
        .backup-info { display: flex; font-size: 11px; color: #94a3b8; justify-content: space-between; }

        /* Main Area */
        .main-content { flex: 1; position: relative; display: flex; flex-direction: column; }
        .top-banner {
            background: rgba(245, 158, 11, 0.9); color: #000; padding: 8px; text-align: center;
            font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }
        #canvas { flex: 1; cursor: grab; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }

        /* Estilos do Organograma (D3) */
        .node-rect { fill: var(--node-bg); stroke: var(--border-color); stroke-width: 2px; rx: 12; }
        .node-role { fill: var(--accent-color); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .node-name { fill: white; font-size: 14px; font-weight: 700; }
        .link { fill: none; stroke: #475569; stroke-width: 2px; }

        /* Modal Visualização */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--sidebar-bg); width: 500px; padding: 30px; border-radius: 20px;
            border: 1px solid var(--border-color); position: relative;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #94a3b8; }
        .modal-field { margin-bottom: 20px; }
        .modal-label { font-size: 10px; color: var(--accent-color); text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        .modal-value { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); min-height: 40px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i data-lucide="archive-restore"></i> Histórico</h1>
                <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Arquivos na pasta data/backups</p>
            </div>
            
            <div style="padding: 12px; border-bottom: 1px solid var(--border-color);">
                <div style="position: relative;">
                    <input type="text" id="search-backup" placeholder="Buscar no conteúdo..." 
                        style="width: 100%; background: var(--bg-color); border: 1px solid var(--border-color); padding: 10px 10px 10px 35px; border-radius: 8px; color: white; font-size: 13px;">
                    <i data-lucide="search" style="position: absolute; left: 10px; top: 10px; width: 16px; color: #94a3b8;"></i>
                </div>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #94a3b8;">
                    <input type="checkbox" id="filter-forward" style="cursor: pointer;">
                    <label for="filter-forward" style="cursor: pointer;">Apenas com encaminhamento preenchido</label>
                </div>
            </div>

            <div id="backup-list" class="backup-list-container">
                <!-- Lista de backups aqui -->
            </div>
        </aside>

        <main class="main-content">
            <div class="top-banner">
                <i data-lucide="alert-triangle"></i> Modo de Visualização de Backup - Somente Leitura
            </div>
            <div id="canvas"></div>
        </main>
    </div>

    <!-- Modal de Visualização de Detalhes -->
    <div id="node-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()"><i data-lucide="x"></i></div>
            <h2 id="modal-node-role" style="margin-bottom: 20px; color: var(--accent-color);">Detalhes</h2>
            
            <div class="modal-field">
                <div class="modal-label">Cargo/Função</div>
                <div id="view-role" class="modal-value"></div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Nome Completo</div>
                <div id="view-name" class="modal-value"></div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Documentações</div>
                <div id="view-docs" class="modal-value"></div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Encaminhamento</div>
                <div id="view-forward" class="modal-value"></div>
            </div>
        </div>
    </div>

    <script src="backup-viewer.js"></script>
</body>
</html>
